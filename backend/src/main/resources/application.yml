spring:
  application:
    name: Book Record

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

jwt:
  secret: ${JWT_SECRET:bookrecord-default-secret-key-for-development-only-please-change-in-production}
  expiration: 86400000 # 24 hours in milliseconds

# 应用自定义配置
app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}  # 前端基础URL，用于生成分享链接