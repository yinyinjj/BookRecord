spring:
  datasource:
    url: jdbc:h2:mem:book_record
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

logging:
  level:
    com.bookrecord: DEBUG
    org.springframework.security: DEBUG